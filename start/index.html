<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>Gastrofon · Sprache wählen / Choose Language</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%238EB216'/%3E%3Cg stroke='white' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round' fill='none' transform='translate(4,4)'%3E%3Cpath d='M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2'/%3E%3Cpath d='M7 2v20'/%3E%3Cpath d='M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7'/%3E%3C/g%3E%3C/svg%3E">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700;800&display=swap">
<style>
:root {
  --brand:       #7BA30E;
  --brand-light: #9BCA1A;
  --brand-dark:  #4E6908;
  --ink:         #1A1A2E;
  --ink-soft:    #444455;
  --mute:        #7A7A88;
  --hair:        #E6E6EC;
  --canvas:      #F7F7FA;
  --paper:       #FFFFFF;
  --font: 'Work Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  font-family: var(--font);
  background: var(--canvas);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
}

body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 48px 24px;
  overflow: auto;
}

/* Subtle brand tint in the background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse 70% 50% at 50% 38%, rgba(123,163,14,.07) 0%, transparent 68%);
  pointer-events: none;
}

/* ─────────────────────────────
   Logo — identisch zur Präsentation, skaliert
───────────────────────────── */
.logo {
  display: inline-flex;
  align-items: center;
  gap: 18px;
  margin-bottom: 10px;
}

.logo-icon {
  width: 64px;
  height: 64px;
  background: var(--brand);
  border-radius: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  animation: logo-glow 3s ease-in-out infinite;
}

@keyframes logo-glow {
  0%, 100% { box-shadow: 0 0 10px rgba(155,202,26,.22), 0 4px 16px rgba(123,163,14,.20); }
  50%       { box-shadow: 0 0 20px rgba(155,202,26,.38), 0 4px 22px rgba(123,163,14,.32); }
}

.logo-icon svg {
  width: 34px;
  height: 34px;
  color: #fff;
}

.logo-text {
  font-size: 40px;
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1;
}

/* Light-mode adaptation: "Gastro" in dark ink (not white like in presentation) */
.logo-text .gastro { color: var(--ink); }
.logo-text .fon {
  color: var(--brand);
  animation: logo-text-glow-green 3s ease-in-out infinite;
}

@keyframes logo-text-glow-green {
  0%, 100% { text-shadow: 0 0 8px rgba(155,202,26,.18); }
  50%       { text-shadow: 0 0 14px rgba(155,202,26,.35); }
}

/* ─────────────────────────────
   Tagline
───────────────────────────── */
.tagline {
  font-size: 12px;
  font-weight: 500;
  letter-spacing: .13em;
  text-transform: uppercase;
  color: var(--mute);
  margin-bottom: 52px;
}

/* ─────────────────────────────
   Language Cards
───────────────────────────── */
.cards {
  display: flex;
  gap: 20px;
  width: 100%;
  max-width: 520px;
}

.card {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  padding: 36px 28px 32px;
  background: var(--paper);
  border: 1.5px solid var(--hair);
  border-radius: 22px;
  cursor: pointer;
  text-decoration: none;
  color: inherit;
  box-shadow: 0 1px 3px rgba(26,26,46,.04), 0 6px 20px rgba(26,26,46,.05);
  transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
  position: relative;
  overflow: hidden;
}

.card:hover {
  transform: translateY(-5px);
  border-color: rgba(123,163,14,.45);
  box-shadow: 0 4px 12px rgba(26,26,46,.07), 0 16px 40px rgba(26,26,46,.09), 0 0 0 1px rgba(123,163,14,.20);
}

.card:active { transform: translateY(-2px); }

/* Highlighted card (auto-detected browser language) */
.card.is-hint {
  border-color: rgba(123,163,14,.40);
  box-shadow: 0 1px 3px rgba(26,26,46,.04), 0 6px 20px rgba(26,26,46,.05), 0 0 0 1px rgba(123,163,14,.18);
}

.card.is-hint:hover {
  border-color: rgba(123,163,14,.65);
  box-shadow: 0 4px 12px rgba(26,26,46,.07), 0 16px 40px rgba(26,26,46,.09), 0 0 0 1px rgba(123,163,14,.35);
}

/* ─────────────────────────────
   Recommended badge
───────────────────────────── */
.hint-badge {
  position: absolute;
  top: 14px; right: 14px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .07em;
  text-transform: uppercase;
  color: var(--brand-dark);
  background: rgba(123,163,14,.11);
  border: 1px solid rgba(123,163,14,.26);
  border-radius: 7px;
  padding: 3px 9px;
  opacity: 0;
  transition: opacity .3s ease;
}

.card.is-hint .hint-badge { opacity: 1; }

/* ─────────────────────────────
   Flag SVGs
───────────────────────────── */
.card-flag {
  width: 72px;
  /* height follows SVG viewBox aspect ratio (5:3) → ~43px */
  border-radius: 6px;
  overflow: hidden;
  flex-shrink: 0;
  box-shadow:
    0 0 0 1px rgba(26,26,46,.10),
    0 2px 8px rgba(26,26,46,.12);
}

.card-flag svg {
  display: block;
  width: 100%;
  height: auto;
}

/* ─────────────────────────────
   Card text
───────────────────────────── */
.card-lang {
  font-size: 20px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -.25px;
}

.card-label {
  font-size: 13px;
  font-weight: 400;
  color: var(--mute);
  text-align: center;
  line-height: 1.55;
}

.card-cta {
  margin-top: 4px;
  font-size: 11.5px;
  font-weight: 600;
  letter-spacing: .07em;
  text-transform: uppercase;
  color: var(--brand);
  display: flex;
  align-items: center;
  gap: 5px;
}

.card-cta svg {
  width: 12px; height: 12px;
  transition: transform .15s ease;
}

.card:hover .card-cta svg { transform: translateX(3px); }

/* ─────────────────────────────
   Footer
───────────────────────────── */
.footer {
  margin-top: 48px;
  font-size: 12px;
  color: var(--mute);
  opacity: .55;
  letter-spacing: .04em;
}

/* ─────────────────────────────
   Mobile
───────────────────────────── */
@media (max-width: 480px) {
  .cards { flex-direction: column; max-width: 300px; }
  .tagline { margin-bottom: 36px; }
  .card { padding: 28px 22px 24px; gap: 13px; }
  .logo-text { font-size: 34px; }
  .logo-icon { width: 54px; height: 54px; border-radius: 15px; }
  .logo-icon svg { width: 28px; height: 28px; }
}
</style>
</head>
<body>

<!-- Logo — identisch zur Präsentation -->
<div class="logo">
  <div class="logo-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="m16 2-2.3 2.3a3 3 0 0 0 0 4.2l1.8 1.8a3 3 0 0 0 4.2 0L22 8"/>
      <path d="M15 15 3.3 3.3a4.2 4.2 0 0 0 0 6l7.3 7.3c.7.7 2 .7 2.8 0L15 15Zm0 0 7 7"/>
      <path d="m2.1 21.8 6.4-6.3"/>
      <path d="m19 5-7 7"/>
    </svg>
  </div>
  <div class="logo-text">
    <span class="gastro">Gastro</span><span class="fon">fon</span>
  </div>
</div>

<p class="tagline">Produktvorstellung &middot; Product Presentation</p>

<div class="cards">

  <!-- ── Deutsch ── -->
  <a class="card" id="card-de" href="#" onclick="navigate('de'); return false;">
    <span class="hint-badge">Empfohlen</span>

    <!-- Deutschland-Flagge: schwarz / rot / gold, viewBox 5×3 -->
    <div class="card-flag">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 5 3">
        <rect width="5" height="1" y="0" fill="#000000"/>
        <rect width="5" height="1" y="1" fill="#DD0000"/>
        <rect width="5" height="1" y="2" fill="#FFCE00"/>
      </svg>
    </div>

    <span class="card-lang">Deutsch</span>
    <span class="card-label">Präsentation auf Deutsch</span>
    <span class="card-cta">
      Öffnen
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 8h10M9 4l4 4-4 4"/>
      </svg>
    </span>
  </a>

  <!-- ── English ── -->
  <a class="card" id="card-en" href="#" onclick="navigate('en'); return false;">
    <span class="hint-badge">Recommended</span>

    <!-- Union Jack, viewBox 5×3 (same ratio as DE flag for consistent display) -->
    <div class="card-flag">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 36">
        <defs>
          <clipPath id="uk-clip"><rect width="60" height="36" rx="0"/></clipPath>
        </defs>
        <g clip-path="url(#uk-clip)">
          <!-- Blue field -->
          <rect width="60" height="36" fill="#012169"/>
          <!-- St Andrew's white saltire -->
          <line x1="0" y1="0" x2="60" y2="36" stroke="#fff" stroke-width="12"/>
          <line x1="60" y1="0" x2="0" y2="36" stroke="#fff" stroke-width="12"/>
          <!-- St Patrick's red saltire (simplified) -->
          <line x1="0" y1="0" x2="60" y2="36" stroke="#C8102E" stroke-width="7"/>
          <line x1="60" y1="0" x2="0" y2="36" stroke="#C8102E" stroke-width="7"/>
          <!-- St George's white cross -->
          <rect x="0" y="13.5" width="60" height="9" fill="#fff"/>
          <rect x="25.5" y="0" width="9" height="36" fill="#fff"/>
          <!-- St George's red cross -->
          <rect x="0" y="15.5" width="60" height="5" fill="#C8102E"/>
          <rect x="27.5" y="0" width="5" height="36" fill="#C8102E"/>
        </g>
      </svg>
    </div>

    <span class="card-lang">English</span>
    <span class="card-label">Presentation in English</span>
    <span class="card-cta">
      Open
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 8h10M9 4l4 4-4 4"/>
      </svg>
    </span>
  </a>

</div>

<p class="footer">ninepointfive AI</p>

<script>
  const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)
    || (window.innerWidth < 768 && 'ontouchstart' in window);

  const preferEN = (navigator.language || 'de').toLowerCase().startsWith('en');
  document.getElementById(preferEN ? 'card-en' : 'card-de').classList.add('is-hint');

  function navigate(choice) {
    window.location.href = choice === 'de'
      ? (isMobile ? '../mobile/?variant=extended' : '../?variant=extended')
      : (isMobile ? '../en-mobile/?variant=extended' : '../en/?variant=extended');
  }
</script>

</body>
</html>
